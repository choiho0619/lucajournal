<style>
:root{
  /* Brand override: toffee brown accent replaces the system's gold, per brand spec.
     Ground, text and structural tokens (cream bg, ink text, hairline dividers,
     spacing/radius/shadow scale) are kept from the Classical system as-is. */
  --color-accent: #854F0B;
  --color-accent-2: #854F0B;
  --color-accent-100: #FBF1E4;
  --color-accent-200: #F2DFC0;
  --color-accent-300: #E0BD86;
  --color-accent-400: #C99A57;
  --color-accent-500: #A8722C;
  --color-accent-600: #854F0B;
  --color-accent-700: #6E4109;
  --color-accent-800: #573307;
  --color-accent-900: #2A1804;
  --color-accent-2-100: #FBF1E4;
  --color-accent-2-200: #F2DFC0;
  --color-accent-2-300: #E0BD86;
  --color-accent-2-400: #C99A57;
  --color-accent-2-500: #A8722C;
  --color-accent-2-600: #854F0B;
  --color-accent-2-700: #6E4109;
  --color-accent-2-800: #573307;
  --color-accent-2-900: #2A1804;
  /* Korean serif stack: Noto Serif KR for Hangul, system serif fallback for Latin/numerals */
  --font-kr-heading: "Noto Serif KR", var(--font-heading), serif;
  --font-kr-body: "Noto Serif KR", var(--font-body), serif;
}
/* View Transitions API: 크로스 도큐먼트 전환. 미지원 브라우저에서는 조용히 무시되는 progressive enhancement */
@view-transition {
  navigation: auto;
}
::view-transition-old(root),
::view-transition-new(root) {
  animation-duration: 0.18s;
}
html{scroll-behavior:smooth;}
body{margin:0;text-wrap:pretty;font-family:var(--font-kr-body);display:flex;flex-direction:column;min-height:100vh;}
/* footer 위치 고정: body 직속 wrapper(div 또는 index.html의 section)를 flex column으로 늘리고,
   footer는 margin-top:auto로 항상 맨 아래에 붙인다 */
body > div,body > section{flex:1;display:flex;flex-direction:column;}
body > section > div{flex:1;display:flex;flex-direction:column;}
.page-main{flex:1;}
h1,h2,h3,h4,h5,h6{font-family:var(--font-kr-heading);}
.wrap{max-width:1120px;margin:0 auto;padding:0 clamp(20px,5vw,64px);}
.rule{height:1px;border:0;margin:0;background:var(--color-divider);}
a{color:var(--color-accent-700);text-decoration:none;}
a:hover{color:var(--color-accent);text-decoration:underline;}

/* — cross mark (simple silhouette, no ornament) — */
.cross{position:relative;width:20px;height:20px;flex:none;}
.cross::before,.cross::after{content:"";position:absolute;background:var(--color-accent);}
.cross::before{left:50%;top:0;width:3px;height:100%;transform:translateX(-50%);}
.cross::after{top:38%;left:0;width:100%;height:3px;}

/* — masthead / nav — */
.nav{display:flex;align-items:center;justify-content:space-between;gap:24px;
  padding:22px clamp(20px,5vw,64px);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-name{font-family:var(--font-kr-heading);font-weight:600;font-size:20px;letter-spacing:-.01em;}
.nav-links{display:flex;gap:28px;align-items:center;list-style:none;margin:0;padding:0;}
.nav-links a{font-size:14.5px;color:#201f1d;}
.nav-links a:hover{color:var(--color-accent-700);}
.nav-actions{display:flex;align-items:center;gap:12px;}
.nav-toggle{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;
  width:36px;height:36px;border:none;background:transparent;padding:0;cursor:pointer;flex:none;}
.nav-toggle-bar{display:block;width:22px;height:2px;background:var(--color-text);border-radius:1px;
  transition:transform .18s ease,opacity .18s ease;}
.nav-toggle[aria-expanded="true"] .nav-toggle-bar:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-toggle[aria-expanded="true"] .nav-toggle-bar:nth-child(2){opacity:0;}
.nav-toggle[aria-expanded="true"] .nav-toggle-bar:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

@media (max-width: 640px){
  .brand-name{white-space:nowrap;font-size:17px;}
  .nav{position:relative;}
  .nav-toggle{display:flex;}
  .nav-links{display:none;flex-direction:column;align-items:stretch;gap:0;
    position:absolute;top:100%;left:0;right:0;margin:0;
    background:var(--color-bg);border:1px solid var(--color-divider);border-top:none;
    padding:4px 0;z-index:20;
    box-shadow:0 8px 20px color-mix(in srgb, var(--color-text) 12%, transparent);}
  .nav-links.nav-open{display:flex;}
  .nav-links li{flex:none;width:100%;}
  .nav-links a{white-space:normal;display:block;padding:12px clamp(20px,5vw,64px);}
  #auth-area{min-width:96px!important;justify-content:flex-end;}
}

/* — hero shared type — */
.eyebrow{display:block;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--color-accent-700);font-weight:600;margin:0 0 14px;}
.headline{font-weight:600;letter-spacing:-.01em;margin:0;}
.sub{font-size:16.5px;line-height:1.7;color:color-mix(in srgb, var(--color-text) 76%, transparent);
  max-width:56ch;margin:16px 0 0;}

/* — write form — */
.field{margin:0 0 20px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--color-accent-700);margin:0 0 8px;}
.field select,.field input,.field textarea{width:100%;box-sizing:border-box;font-family:inherit;font-size:15px;
  padding:10px 12px;border:1px solid var(--color-divider);border-radius:var(--radius-md);background:transparent;color:inherit;}
.field textarea{min-height:280px;line-height:1.7;resize:vertical;}
.form-actions{display:flex;gap:12px;margin-top:8px;}
.form-message{font-size:14px;margin:16px 0 0;}

footer.site-footer{padding:36px clamp(20px,5vw,64px);font-size:13px;
  color:color-mix(in srgb, var(--color-text) 60%, transparent);
  display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:auto;}
</style>

<hr class="rule">

  <div class="wrap">
    <section style="padding:56px 0 64px;max-width:800px;margin:0 auto;">
      <span class="eyebrow" id="write-eyebrow">글쓰기</span>
      <h1 class="headline" style="font-size:clamp(26px,3vw,34px);margin:0 0 8px;" id="write-heading">새 글 작성</h1>

      <div id="gate-login" hidden>
        <p class="sub">로그인이 필요합니다</p>
        <button type="button" id="gate-login-btn" class="btn btn-primary" style="margin-top:16px;">로그인</button>

      <div id="gate-no-permission" hidden>

<script type="module" src="./auth-ui.js"></script>
<script type="module">
  import { supabase, signInWithGoogle } from "./auth.js";
  import { fetchMyRole, fetchActiveCategories, createPost, fetchPostById, updatePost } from "./posts.js";

  const gateLogin = document.getElementById("gate-login");
  const gateNoPermission = document.getElementById("gate-no-permission");
  const writeForm = document.getElementById("write-form");
  const categorySelect = document.getElementById("post-category");
  const titleInput = document.getElementById("post-title");
  const contentTextarea = document.getElementById("post-content");
  const formMessage = document.getElementById("form-message");
  const eyebrowEl = document.getElementById("write-eyebrow");
  const headingEl = document.getElementById("write-heading");
  const saveDraftBtn = document.getElementById("save-draft-btn");
  const publishBtn = document.getElementById("publish-btn");
  const initialCode = new URLSearchParams(window.location.search).get("code");
  const editId = new URLSearchParams(window.location.search).get("edit");
  let editCode = null;

  document.getElementById("gate-login-btn").addEventListener("click", () => signInWithGoogle());

  function showMessage(text, isError) {
    formMessage.textContent = text;
    formMessage.style.color = isError ? "#b3261e" : "";
    formMessage.hidden = false;
  }

  async function populateCategories() {
    const categories = await fetchActiveCategories();
    for (const category of categories) {
      const option = document.createElement("option");
      option.value = category.id;
      option.dataset.code = category.code;
      option.textContent = category.name;
      categorySelect.appendChild(option);
    }
    if (initialCode) {
      const match = Array.from(categorySelect.options).find((opt) => opt.dataset.code === initialCode);
      if (match) categorySelect.value = match.value;
    }
  }

  async function submit(status) {
    formMessage.hidden = true;
    const result = editId
      ? await updatePost({
          id: editId,
          categoryId: categorySelect.value,
          title: titleInput.value,
          content: contentTextarea.value,
        })
      : await createPost({
          categoryId: categorySelect.value,
          title: titleInput.value,
          content: contentTextarea.value,
          status,
        });

    if (result.error) {
      showMessage(result.error, true);
      return;
    }

    if (editId || status === "published") {
      showMessage("저장되었습니다");
      const code = editCode || initialCode || "DAILY";
      window.location.href = `category.html?code=${encodeURIComponent(code)}`;
      return;
    }

    showMessage("저장되었습니다");
  }

  async function loadPostForEdit() {
    const post = await fetchPostById(editId);
    if (!post) {
      writeForm.hidden = true;
      gateNoPermission.querySelector("p").textContent = "글을 찾을 수 없습니다";
      gateNoPermission.hidden = false;
      return;
    }

    // 클라이언트 측 권한 체크는 UX 안내용일 뿐이며, 실제 접근 제어는 DB의 RLS 정책(posts_update_own 등)이 담당한다.
    const { data: { user } } = await supabase.auth.getUser();
    const myRole = await fetchMyRole();
    const canEdit = !!user && (user.id === post.author_id || myRole === "admin");
    if (!canEdit) {
      writeForm.hidden = true;
      gateNoPermission.hidden = false;
      return;
    }

    editCode = post.categories?.code || null;
    titleInput.value = post.title;
    contentTextarea.value = post.content;
    categorySelect.value = String(post.category_id);

    eyebrowEl.textContent = "글 수정";
    headingEl.textContent = "글 수정";
    saveDraftBtn.hidden = true;
    publishBtn.textContent = "수정 저장";
  }

  document.getElementById("save-draft-btn").addEventListener("click", () => submit("draft"));
  document.getElementById("publish-btn").addEventListener("click", () => submit("published"));
  document.getElementById("cancel-btn").addEventListener("click", () => {
    const code = editCode || initialCode || "DAILY";
    window.location.href = `category.html?code=${encodeURIComponent(code)}`;
  });

  // 클라이언트 측 role 체크는 UX 안내용일 뿐이며, 실제 접근 제어는 DB의 RLS 정책이 담당한다.
  document.addEventListener("DOMContentLoaded", async () => {
    const role = await fetchMyRole();

    if (role === null) {
      gateLogin.hidden = false;
      return;
    }
    if (role === "writer" || role === "admin") {
      writeForm.hidden = false;
      await populateCategories();
      if (editId) {
        await loadPostForEdit();
      }
      return;
    }
    gateNoPermission.hidden = false;
  });
</script>
<script>
  (function(){
    var btn = document.getElementById("nav-toggle");
    var menu = document.getElementById("nav-links");
    if (!btn || !menu) return;
    btn.addEventListener("click", function(){
      var open = btn.getAttribute("aria-expanded") === "true";
      btn.setAttribute("aria-expanded", String(!open));
      btn.setAttribute("aria-label", open ? "메뉴 열기" : "메뉴 닫기");
      menu.classList.toggle("nav-open", !open);
    });
  })();
</script>
