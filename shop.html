  /* Brand override: toffee brown accent replaces the system's gold, per brand spec.
     Ground, text and structural tokens (cream bg, ink text, hairline dividers,
     spacing/radius/shadow scale) are kept from the Classical system as-is. */
  --color-accent: #854F0B;
  --color-accent-2: #854F0B;
  --color-accent-100: #FBF1E4;
  --color-accent-200: #F2DFC0;
  --color-accent-300: #E0BD86;
  --color-accent-400: #C99A57;
  --color-accent-500: #A8722C;
  --color-accent-600: #854F0B;
  --color-accent-700: #6E4109;
  --color-accent-800: #573307;
  --color-accent-900: #2A1804;
  --color-accent-2-100: #FBF1E4;
  --color-accent-2-200: #F2DFC0;
  --color-accent-2-300: #E0BD86;
  --color-accent-2-400: #C99A57;
  --color-accent-2-500: #A8722C;
  --color-accent-2-600: #854F0B;
  --color-accent-2-700: #6E4109;
  --color-accent-2-800: #573307;
  --color-accent-2-900: #2A1804;
  /* Korean serif stack: Noto Serif KR for Hangul, system serif fallback for Latin/numerals */
  --font-kr-heading: "Noto Serif KR", var(--font-heading), serif;
  --font-kr-body: "Noto Serif KR", var(--font-body), serif;
}
/* View Transitions API: 크로스 도큐먼트 전환. 미지원 브라우저에서는 조용히 무시되는 progressive enhancement */
@view-transition {
  navigation: auto;
}
::view-transition-old(root),
::view-transition-new(root) {
  animation-duration: 0.18s;
}
html{scroll-behavior:smooth;}
body{margin:0;text-wrap:pretty;font-family:var(--font-kr-body);display:flex;flex-direction:column;min-height:100vh;}
/* footer 위치 고정: body 직속 wrapper(div 또는 index.html의 section)를 flex column으로 늘리고,
   footer는 margin-top:auto로 항상 맨 아래에 붙인다 */
body > div,body > section{flex:1;display:flex;flex-direction:column;}
body > section > div{flex:1;display:flex;flex-direction:column;}
.page-main{flex:1;}
h1,h2,h3,h4,h5,h6{font-family:var(--font-kr-heading);}
.wrap{max-width:1120px;margin:0 auto;padding:0 clamp(20px,5vw,64px);}
.rule{height:1px;border:0;margin:0;background:var(--color-divider);}
a{color:var(--color-accent-700);text-decoration:none;}
a:hover{color:var(--color-accent);text-decoration:underline;}

/* — cross mark (simple silhouette, no ornament) — */
.cross{position:relative;width:20px;height:20px;flex:none;}
.cross::before,.cross::after{content:"";position:absolute;background:var(--color-accent);}
.cross::before{left:50%;top:0;width:3px;height:100%;transform:translateX(-50%);}
.cross::after{top:38%;left:0;width:100%;height:3px;}

/* — masthead / nav — */
.nav{display:flex;align-items:center;justify-content:space-between;gap:24px;
  padding:22px clamp(20px,5vw,64px);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-name{font-family:var(--font-kr-heading);font-weight:600;font-size:20px;letter-spacing:-.01em;}
.nav-links{display:flex;gap:28px;align-items:center;list-style:none;margin:0;padding:0;}
.nav-links a{font-size:14.5px;color:#201f1d;}
.nav-links a:hover{color:var(--color-accent-700);}
.nav-actions{display:flex;align-items:center;gap:12px;}
.nav-toggle{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;
  width:36px;height:36px;border:none;background:transparent;padding:0;cursor:pointer;flex:none;}
.nav-toggle-bar{display:block;width:22px;height:2px;background:var(--color-text);border-radius:1px;
  transition:transform .18s ease,opacity .18s ease;}
.nav-toggle[aria-expanded="true"] .nav-toggle-bar:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-toggle[aria-expanded="true"] .nav-toggle-bar:nth-child(2){opacity:0;}
.nav-toggle[aria-expanded="true"] .nav-toggle-bar:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

@media (max-width: 640px){
  .brand-name{white-space:nowrap;font-size:17px;}
  .nav{position:relative;}
  .nav-toggle{display:flex;}
  .nav-links{display:none;flex-direction:column;align-items:stretch;gap:0;
    position:absolute;top:100%;left:0;right:0;margin:0;
    background:var(--color-bg);border:1px solid var(--color-divider);border-top:none;
    padding:4px 0;z-index:20;
    box-shadow:0 8px 20px color-mix(in srgb, var(--color-text) 12%, transparent);}
  .nav-links.nav-open{display:flex;}
  .nav-links li{flex:none;width:100%;}
  .nav-links a{white-space:normal;display:block;padding:12px clamp(20px,5vw,64px);}
  #auth-area{min-width:96px!important;justify-content:flex-end;}
}

/* — hero shared type — */

.headline{font-weight:600;letter-spacing:-.01em;margin:0;}
.sub{font-size:16.5px;line-height:1.7;color:color-mix(in srgb, var(--color-text) 76%, transparent);
  max-width:56ch;margin:16px 0 0;}

/* — shop gallery — */
.shop-tabs{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 28px;}
.shop-tab{font-size:13.5px;padding:8px 16px;border:1px solid var(--color-divider);border-radius:999px;
  background:transparent;color:var(--color-text);cursor:pointer;font-family:inherit;}
.shop-tab:hover{background:color-mix(in srgb, var(--color-text) 7%, transparent);}
.shop-tab.active{background:var(--color-accent);border-color:var(--color-accent);color:var(--color-bg);}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.shop-card{border:1px solid var(--color-divider);border-radius:var(--radius-md);overflow:hidden;
  display:flex;flex-direction:column;background:var(--color-bg);}
.shop-card-image{width:100%;aspect-ratio:1/1;background:var(--color-bg);
  overflow:hidden;box-sizing:border-box;padding:20px;}
.shop-card-image img{width:100%;height:100%;object-fit:contain;display:block;}
.shop-card-body{padding:20px;display:flex;flex-direction:column;gap:8px;flex:1;}
.shop-badge{display:inline-flex;align-items:center;width:fit-content;font-size:11.5px;
  letter-spacing:.04em;padding:4px 10px;border-radius:999px;}
.shop-badge-physical{background:var(--color-accent-100);color:var(--color-accent-700);}
.shop-badge-digital{background:var(--color-neutral-200);color:var(--color-neutral-800);}
.shop-card-name{font-size:16px;font-weight:600;margin:0;}
.shop-card-price{font-size:14px;color:color-mix(in srgb, var(--color-text) 76%, transparent);margin:0;}
.shop-card-actions{margin-top:auto;padding-top:4px;}
.shop-empty{font-size:14.5px;padding:8px 0;color:color-mix(in srgb, var(--color-text) 60%, transparent);}

/* .shop-tabs carries display:flex, which would win the cascade over the bare [hidden] UA rule
   when hidden is toggled directly on it — force it explicitly (same trap as post.html back-to-list). */
[hidden]{display:none !important;}

footer.site-footer{padding:36px clamp(20px,5vw,64px);font-size:13px;

  display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:auto;}

<script type="module" src="./auth-ui.js"></script>
<script type="module">
  import { PRODUCTS } from "./shop-products.js";

  const TYPE_LABEL_BADGE = { physical: "실물 배송", digital: "디지털 다운로드" };
  const TYPE_LABEL_TAB = { physical: "실물 상품", digital: "디지털 다운로드" };

  function getDistinctTypes(products) {
    return [...new Set(products.map((p) => p.type))];
  }

  function renderProducts(products, { showBadge }) {
    const grid = document.getElementById("shop-grid");
    grid.innerHTML = "";

    if (products.length === 0) {
      const empty = document.createElement("p");
      empty.className = "shop-empty";
      empty.textContent = "해당 유형의 상품이 아직 없습니다";
      grid.appendChild(empty);
      return;
    }

    for (const p of products) {
      const card = document.createElement("div");
      card.className = "shop-card";
      card.dataset.type = p.type;

      const imgWrap = document.createElement("div");
      imgWrap.className = "shop-card-image";
      const img = document.createElement("img");
      img.src = p.image;
      img.alt = p.name;
      img.loading = "lazy";
      img.addEventListener("error", () => { img.style.display = "none"; });
      imgWrap.appendChild(img);
      card.appendChild(imgWrap);

      const body = document.createElement("div");
      body.className = "shop-card-body";

      if (showBadge) {
        const badge = document.createElement("span");
        badge.className = `shop-badge shop-badge-${p.type}`;
        badge.textContent = TYPE_LABEL_BADGE[p.type] || p.type;
        body.appendChild(badge);
      }

      const name = document.createElement("h3");
      name.className = "shop-card-name";
      name.textContent = p.name;
      body.appendChild(name);

      const price = document.createElement("p");
      price.className = "shop-card-price";
      price.textContent = (p.price && p.price !== "TBD") ? p.price : "스마트스토어에서 확인";
      body.appendChild(price);

      const actions = document.createElement("div");
      actions.className = "shop-card-actions";

      const isReady = !!p.price && p.price !== "TBD" && !!p.storeUrl && p.storeUrl !== "TBD";
      if (isReady) {
        const buyBtn = document.createElement("a");
        buyBtn.className = "btn btn-primary";
        buyBtn.href = p.storeUrl;
        buyBtn.target = "_blank";
        buyBtn.rel = "noopener noreferrer";
        buyBtn.textContent = "구매하기";
        actions.appendChild(buyBtn);
      } else {
        const buyBtn = document.createElement("button");
        buyBtn.type = "button";
        buyBtn.className = "btn btn-secondary";
        buyBtn.disabled = true;
        buyBtn.textContent = "준비 중";
        actions.appendChild(buyBtn);
      }
      body.appendChild(actions);

      card.appendChild(body);
      grid.appendChild(card);
    }
  }

  function setupFilters(products) {
    const tabsEl = document.getElementById("shop-tabs");
    const types = getDistinctTypes(products);

    if (types.length < 2) {
      tabsEl.hidden = true;
      return;
    }

    tabsEl.hidden = false;
    tabsEl.innerHTML = "";

    const allBtn = document.createElement("button");
    allBtn.type = "button";
    allBtn.className = "shop-tab active";
    allBtn.dataset.filter = "all";
    allBtn.textContent = "전체";
    tabsEl.appendChild(allBtn);

    for (const type of types) {
      const tabBtn = document.createElement("button");
      tabBtn.type = "button";
      tabBtn.className = "shop-tab";
      tabBtn.dataset.filter = type;
      tabBtn.textContent = TYPE_LABEL_TAB[type] || type;
      tabsEl.appendChild(tabBtn);
    }

    const tabs = tabsEl.querySelectorAll(".shop-tab");
    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        const type = tab.dataset.filter;
        const filtered = type === "all" ? products : products.filter((p) => p.type === type);
        renderProducts(filtered, { showBadge: types.length >= 2 });
      });
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    const types = getDistinctTypes(PRODUCTS);
    renderProducts(PRODUCTS, { showBadge: types.length >= 2 });
    setupFilters(PRODUCTS);
  });
</script>
<script>
  (function(){
    var btn = document.getElementById("nav-toggle");
    var menu = document.getElementById("nav-links");
    if (!btn || !menu) return;
    btn.addEventListener("click", function(){
      var open = btn.getAttribute("aria-expanded") === "true";
      btn.setAttribute("aria-expanded", String(!open));
      btn.setAttribute("aria-label", open ? "메뉴 열기" : "메뉴 닫기");
      menu.classList.toggle("nav-open", !open);
    });
  })();
</script>
