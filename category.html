<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>루카저널 — 말씀과 역사, 그리고 오늘의 시선</title>
<template id="__bundler_thumbnail" data-bg-color="#f3f2f2">
  <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="120" fill="#f3f2f2"/>
    <rect x="56" y="30" width="8" height="60" fill="#854F0B"/>
    <rect x="36" y="50" width="48" height="8" fill="#854F0B"/>
  </svg>
</template>
<script src="./ds-base.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Brand override: toffee brown accent replaces the system's gold, per brand spec.
     Ground, text and structural tokens (cream bg, ink text, hairline dividers,
     spacing/radius/shadow scale) are kept from the Classical system as-is. */
  --color-accent: #854F0B;
  --color-accent-2: #854F0B;
  --color-accent-100: #FBF1E4;
  --color-accent-200: #F2DFC0;
  --color-accent-300: #E0BD86;
  --color-accent-400: #C99A57;
  --color-accent-500: #A8722C;
  --color-accent-600: #854F0B;
  --color-accent-700: #6E4109;
  --color-accent-800: #573307;
  --color-accent-900: #2A1804;
  --color-accent-2-100: #FBF1E4;
  --color-accent-2-200: #F2DFC0;
  --color-accent-2-300: #E0BD86;
  --color-accent-2-400: #C99A57;
  --color-accent-2-500: #A8722C;
  --color-accent-2-600: #854F0B;
  --color-accent-2-700: #6E4109;
  --color-accent-2-800: #573307;
  --color-accent-2-900: #2A1804;
  /* Korean serif stack: Noto Serif KR for Hangul, system serif fallback for Latin/numerals */
  --font-kr-heading: "Noto Serif KR", var(--font-heading), serif;
  --font-kr-body: "Noto Serif KR", var(--font-body), serif;
}
html{scroll-behavior:smooth;}
body{margin:0;text-wrap:pretty;font-family:var(--font-kr-body);}
h1,h2,h3,h4,h5,h6{font-family:var(--font-kr-heading);}
.wrap{max-width:1120px;margin:0 auto;padding:0 clamp(20px,5vw,64px);}
.rule{height:1px;border:0;margin:0;background:var(--color-divider);}
a{color:var(--color-accent-700);text-decoration:none;}
a:hover{color:var(--color-accent);text-decoration:underline;}

/* — cross mark (simple silhouette, no ornament) — */
.cross{position:relative;width:20px;height:20px;flex:none;}
.cross::before,.cross::after{content:"";position:absolute;background:var(--color-accent);}
.cross::before{left:50%;top:0;width:3px;height:100%;transform:translateX(-50%);}
.cross::after{top:38%;left:0;width:100%;height:3px;}

/* — masthead / nav — */
.nav{display:flex;align-items:center;justify-content:space-between;gap:24px;
  padding:22px clamp(20px,5vw,64px);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-name{font-family:var(--font-kr-heading);font-weight:600;font-size:20px;letter-spacing:-.01em;}
.nav-links{display:flex;gap:28px;align-items:center;list-style:none;margin:0;padding:0;}
.nav-links a{font-size:14.5px;color:#201f1d;}
.nav-links a:hover{color:var(--color-accent-700);}

/* — hero shared type — */
.eyebrow{display:block;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--color-accent-700);font-weight:600;margin:0 0 14px;}
.headline{font-weight:600;letter-spacing:-.01em;margin:0;}
.sub{font-size:16.5px;line-height:1.7;color:color-mix(in srgb, var(--color-text) 76%, transparent);
  max-width:56ch;margin:16px 0 0;}

/* — recent post list — */
.post-row{display:flex;align-items:baseline;justify-content:space-between;gap:24px;
  padding:16px 0;border-bottom:1px solid var(--color-divider);}
.post-row:first-child{border-top:1px solid var(--color-divider);}
.post-title{font-size:16px;font-weight:500;}
.post-tag{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-accent-700);
  margin-right:10px;}
.post-date{font-size:13px;color:color-mix(in srgb, var(--color-text) 55%, transparent);
  font-feature-settings:"tnum" 1;white-space:nowrap;}

footer.site-footer{padding:36px clamp(20px,5vw,64px);font-size:13px;
  color:color-mix(in srgb, var(--color-text) 60%, transparent);
  display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;}
</style>
</head>
<body>

<div>
  <nav class="nav">
    <a class="brand" href="index.html" style="text-decoration:none;color:inherit;"><span class="cross"></span><span class="brand-name">루카저널</span></a>
    <ul class="nav-links">
      <li><a href="category.html?code=DAILY">묵상</a></li>
      <li><a href="category.html?code=PERSPECTIVE">시사</a></li>
      <li><a href="category.html?code=HERITAGE">역사</a></li>
      <li><a href="category.html?code=APOLOGETICS">변증</a></li>
      <li><a href="category.html?code=NOTICE">공지</a></li>
      <li><a href="about.html">소개</a></li>
    </ul>
    <div id="auth-area" style="display:flex;align-items:center;gap:12px;"></div>
  </nav>
  <hr class="rule">

  <div class="wrap">
    <section id="category-header" style="padding:56px 0 20px;max-width:72ch;">
      <span class="eyebrow" id="category-code"></span>
      <h1 class="headline" style="font-size:clamp(26px,3vw,34px);margin:0 0 8px;" id="category-name"></h1>
      <p class="sub" id="category-description"></p>
    </section>
  </div>
  <hr class="rule" id="category-rule">

  <div class="wrap">
    <section id="category-list-section" style="padding:40px 0 64px;">
      <p id="category-count" class="post-date" style="margin:0 0 12px;" hidden></p>
      <div id="category-posts-list"></div>
      <div id="category-write-link" style="display:flex;justify-content:flex-end;margin-top:20px;"></div>
      <p id="category-others" class="post-date" style="margin:32px 0 0;" hidden></p>
    </section>
  </div>

  <footer class="site-footer">
    <span>© 2026 Luca Journal. All rights reserved.</span>
    <span style="display:flex;gap:16px;flex-wrap:wrap;"><a href="terms.html">이용약관</a><a href="privacy.html">개인정보처리방침</a></span>
  </footer>
</div>

<script type="module" src="./auth-ui.js"></script>
<script type="module">
  import { supabase } from "./auth.js";
  import { fetchPostsByCategory, renderRecentPosts, fetchMyRole, fetchActiveCategories } from "./posts.js";

  function renderNotFound() {
    const header = document.getElementById("category-header");
    header.innerHTML = "";
    const msg = document.createElement("p");
    msg.className = "sub";
    msg.textContent = "카테고리를 찾을 수 없습니다";
    header.appendChild(msg);

    document.getElementById("category-rule").style.display = "none";
    document.getElementById("category-list-section").style.display = "none";
  }

  document.addEventListener("DOMContentLoaded", async () => {
    const code = new URLSearchParams(window.location.search).get("code");
    if (!code) {
      renderNotFound();
      return;
    }

    const { data: category } = await supabase
      .from("categories")
      .select("name, code, description")
      .eq("code", code)
      .single();

    if (!category) {
      renderNotFound();
      return;
    }

    document.getElementById("category-code").textContent = category.code;
    document.getElementById("category-name").textContent = category.name;
    document.getElementById("category-description").textContent = category.description || "";

    const posts = await fetchPostsByCategory(code);
    renderRecentPosts(posts, "category-posts-list", "아직 이 카테고리에 등록된 글이 없습니다");

    if (posts.length > 0) {
      const countEl = document.getElementById("category-count");
      countEl.textContent = `총 ${posts.length}건`;
      countEl.hidden = false;
    }

    const others = (await fetchActiveCategories()).filter((c) => c.code !== code);
    if (others.length > 0) {
      const othersEl = document.getElementById("category-others");
      othersEl.textContent = "다른 카테고리: ";
      others.forEach((c, i) => {
        if (i > 0) othersEl.appendChild(document.createTextNode(" · "));
        const link = document.createElement("a");
        link.href = `category.html?code=${encodeURIComponent(c.code)}`;
        link.textContent = c.name;
        othersEl.appendChild(link);
      });
      othersEl.hidden = false;
    }

    const role = await fetchMyRole();
    if (role === "writer" || role === "admin") {
      const writeLink = document.createElement("a");
      writeLink.className = "btn btn-secondary";
      writeLink.href = `write.html?category=${encodeURIComponent(code)}`;
      writeLink.textContent = "글쓰기";
      document.getElementById("category-write-link").appendChild(writeLink);
    }
  });
</script>
</body>
</html>
