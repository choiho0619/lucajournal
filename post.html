     spacing/radius/shadow scale) are kept from the Classical system as-is. */
  --color-accent: #854F0B;
  --color-accent-2: #854F0B;
  --color-accent-100: #FBF1E4;
  --color-accent-200: #F2DFC0;

  /* Korean serif stack: Noto Serif KR for Hangul, system serif fallback for Latin/numerals */
  --font-kr-heading: "Noto Serif KR", var(--font-heading), serif;

}
/* View Transitions API: 크로스 도큐먼트 전환. 미지원 브라우저에서는 조용히 무시되는 progressive enhancement */
@view-transition {
  navigation: auto;
}
::view-transition-old(root),
::view-transition-new(root) {
  animation-duration: 0.18s;
}
html{scroll-behavior:smooth;}
body{margin:0;text-wrap:pretty;font-family:var(--font-kr-body);display:flex;flex-direction:column;min-height:100vh;}
/* footer 위치 고정: body 직속 wrapper(div 또는 index.html의 section)를 flex column으로 늘리고,

body > section > div{flex:1;display:flex;flex-direction:column;}

/* — cross mark (simple silhouette, no ornament) — */
.cross{position:relative;width:20px;height:20px;flex:none;}

.cross::before{left:50%;top:0;width:3px;height:100%;transform:translateX(-50%);}
.cross::after{top:38%;left:0;width:100%;height:3px;}

@media (min-width: 641px){

.comments-heading{font-size:20px;font-weight:600;margin:0 0 24px;}
.comment-item{padding:20px 0;border-bottom:1px solid var(--color-divider);}

.comment-item-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:0 0 8px;}

.comment-date{font-size:12.5px;color:color-mix(in srgb, var(--color-text) 55%, transparent);}
.comment-body{font-size:15px;line-height:1.75;white-space:pre-wrap;word-break:break-word;margin:0;
  color:color-mix(in srgb, var(--color-text) 88%, transparent);}
.comment-delete-btn{background:none;border:0;padding:0;margin-top:8px;font-size:12.5px;cursor:pointer;

.comment-empty{font-size:14.5px;padding:8px 0;color:color-mix(in srgb, var(--color-text) 60%, transparent);}
.comment-skeleton-line{height:16px;margin:0 0 14px;}
.comment-form-area{margin-top:32px;}
.comment-form-area textarea{width:100%;box-sizing:border-box;font-family:inherit;font-size:15px;line-height:1.7;
  min-height:100px;resize:vertical;padding:10px 12px;border:1px solid var(--color-divider);
  border-radius:var(--radius-md);background:transparent;color:inherit;}
.comment-form-actions{display:flex;justify-content:flex-end;margin-top:10px;}
.comment-form-message{font-size:13.5px;margin:10px 0 0;color:#b3261e;}
.comment-login-hint{font-size:14.5px;color:color-mix(in srgb, var(--color-text) 60%, transparent);}

/* — loading skeleton — */
@keyframes skeleton-pulse{0%,100%{opacity:1;}50%{opacity:.55;}}
.skeleton{background:var(--color-neutral-200, #e8e4dd);border-radius:var(--radius-md, 6px);
  animation:skeleton-pulse 1.4s ease-in-out infinite;}
.skeleton-title{height:34px;width:70%;margin:0 0 14px;}
.skeleton-meta{height:14px;width:30%;margin:0 0 32px;}
.skeleton-body-line{height:14px;width:100%;margin:0 0 14px;}

/* #back-to-list carries the .btn class (display:inline-flex from the design system),
   which would win the cascade over the bare [hidden] UA rule if hidden is ever toggled
   on that element directly rather than its wrapper — force it explicitly here. */
[hidden]{display:none !important;}

footer.site-footer{padding:36px clamp(20px,5vw,64px);font-size:13px;

<script type="module" src="./auth-ui.js"></script>
<script type="module">
  import { supabase } from "./auth.js";
  import { fetchPostBySlug, formatDate, fetchMyRole } from "./posts.js";

  function renderNotFound(container) {
    container.innerHTML = "";
    const msg = document.createElement("p");
    msg.className = "sub";
    msg.textContent = "글을 찾을 수 없습니다";
    container.appendChild(msg);
  }

  function renderPost(container, post) {
    container.innerHTML = "";

    const tag = document.createElement("span");
    tag.className = "eyebrow";
    tag.textContent = post.categories?.code || post.categories?.name || "";
    container.appendChild(tag);

    const title = document.createElement("h1");
    title.className = "headline";
    title.style.fontSize = "clamp(28px,3.2vw,40px)";
    title.textContent = post.title;
    container.appendChild(title);

    const meta = document.createElement("p");
    meta.className = "sub";
    const author = post.profiles?.display_name || "";
    const date = formatDate(post.published_at);
    meta.textContent = author ? `${author} · ${date}` : date;
    container.appendChild(meta);

    const body = document.createElement("div");
    body.className = "post-body";
    body.style.marginTop = "32px";
    const paragraphs = (post.content || "").split(/\n{2,}/).filter((para) => para.trim() !== "");
    for (const para of paragraphs) {
      const p = document.createElement("p");
      const paraLines = para.split("\n");
      paraLines.forEach((paraLine, i) => {
        if (i > 0) p.appendChild(document.createElement("br"));
        p.appendChild(document.createTextNode(paraLine));
      });
      body.appendChild(p);
    }
    container.appendChild(body);
  }

  function formatCommentDate(dateStr) {
    const d = new Date(dateStr);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mi = String(d.getMinutes()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
  }

  async function fetchComments(postId) {
    // 1차 시도: comments.author_id가 public.profiles를 직접 참조하는 FK라고 가정하고 중첩 select 사용
    const nested = await supabase
      .from("comments")
      .select("id, author_id, content, created_at, profiles(display_name)")
      .eq("post_id", postId)
      .eq("is_deleted", false)
      .order("created_at", { ascending: true });

    if (!nested.error) {
      return (nested.data ?? []).map((c) => ({
        id: c.id,
        author_id: c.author_id,
        content: c.content,
        created_at: c.created_at,
        display_name: c.profiles?.display_name || "익명",
      }));
    }

    // 2차 폴백: author_id가 auth.users를 참조해 중첩 select가 실패하는 경우,
    // author_id 목록으로 profiles를 별도 조회해 매핑한다.
    const plain = await supabase
      .from("comments")
      .select("id, author_id, content, created_at")
      .eq("post_id", postId)
      .eq("is_deleted", false)
      .order("created_at", { ascending: true });

    if (plain.error) {
      console.error(plain.error);
      return [];
    }

    const rows = plain.data ?? [];
    const authorIds = [...new Set(rows.map((r) => r.author_id))];
    let profileMap = {};
    if (authorIds.length > 0) {
      const { data: profiles } = await supabase
        .from("profiles")
        .select("id, display_name")
        .in("id", authorIds);
      profileMap = Object.fromEntries((profiles ?? []).map((p) => [p.id, p.display_name]));
    }

    return rows.map((r) => ({
      id: r.id,
      author_id: r.author_id,
      content: r.content,
      created_at: r.created_at,
      display_name: profileMap[r.author_id] || "익명",
    }));
  }

  function renderComments(listEl, countEl, comments, { userId, canModerate }) {
    countEl.textContent = String(comments.length);
    listEl.innerHTML = "";

    if (comments.length === 0) {
      const empty = document.createElement("p");
      empty.className = "comment-empty";
      empty.textContent = "아직 댓글이 없습니다";
      listEl.appendChild(empty);
      return;
    }

    for (const comment of comments) {
      const item = document.createElement("div");
      item.className = "comment-item";

      const head = document.createElement("div");
      head.className = "comment-item-head";

      const author = document.createElement("span");
      author.className = "comment-author";
      author.textContent = comment.display_name;

      const dateEl = document.createElement("span");
      dateEl.className = "comment-date";
      dateEl.textContent = formatCommentDate(comment.created_at);

      head.appendChild(author);
      head.appendChild(dateEl);
      item.appendChild(head);

      const body = document.createElement("p");
      body.className = "comment-body";
      body.textContent = comment.content;
      item.appendChild(body);

      const canDelete = !!userId && (userId === comment.author_id || canModerate);
      if (canDelete) {
        const delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.className = "comment-delete-btn";
        delBtn.textContent = "삭제";
        delBtn.dataset.commentId = comment.id;
        item.appendChild(delBtn);
      }

      listEl.appendChild(item);
    }
  }

  function parseCommentError(message) {
    const match = /RATE_LIMIT:(\d+)/.exec(message || "");
    if (match) {
      const seconds = Number(match[1]);
      if (seconds < 60) return "잠시 후 다시 작성할 수 있습니다";
      const minutes = Math.ceil(seconds / 60);
      return `약 ${minutes}분 후에 다시 작성할 수 있습니다`;
    }
    return "댓글 등록에 실패했습니다";
  }

  function renderLoginPrompt(formArea) {
    formArea.innerHTML = "";
    const hint = document.createElement("p");
    hint.className = "comment-login-hint";
    hint.textContent = "댓글을 작성하려면 로그인하세요";
    formArea.appendChild(hint);
  }

  function renderCommentForm(formArea, { postId, userId, onSubmitted }) {
    formArea.innerHTML = "";

    const textarea = document.createElement("textarea");
    textarea.placeholder = "댓글을 입력하세요";

    const actions = document.createElement("div");
    actions.className = "comment-form-actions";

    const submitBtn = document.createElement("button");
    submitBtn.type = "button";
    submitBtn.className = "btn btn-primary";
    submitBtn.textContent = "등록";
    actions.appendChild(submitBtn);

    const message = document.createElement("p");
    message.className = "comment-form-message";
    message.hidden = true;

    formArea.appendChild(textarea);
    formArea.appendChild(actions);
    formArea.appendChild(message);

    submitBtn.addEventListener("click", async () => {
      const content = textarea.value.trim();
      if (!content) return;

      message.hidden = true;
      submitBtn.disabled = true;

      const { error } = await supabase
        .from("comments")
        .insert({ post_id: postId, author_id: userId, content });

      submitBtn.disabled = false;

      if (error) {
        message.textContent = parseCommentError(error.message);
        message.hidden = false;
        return;
      }

      textarea.value = "";
      await onSubmitted();
    });
  }

  async function setupComments(postId, user, role) {
    const section = document.getElementById("comments-section");
    const listEl = document.getElementById("comments-list");
    const countEl = document.getElementById("comments-count");
    const formArea = document.getElementById("comment-form-area");
    const canModerate = role === "admin";

    async function reload() {
      const comments = await fetchComments(postId);
      renderComments(listEl, countEl, comments, { userId: user?.id, canModerate });
    }

    listEl.addEventListener("click", async (e) => {
      const btn = e.target.closest(".comment-delete-btn");
      if (!btn) return;
      if (!confirm("댓글을 휴지통으로 이동할까요?")) return;

      const { error } = await supabase
        .from("comments")
        .update({ is_deleted: true })
        .eq("id", btn.dataset.commentId);

      if (error) {
        console.error(error);
        return;
      }
      await reload();
    });

    if (user) {
      renderCommentForm(formArea, { postId, userId: user.id, onSubmitted: reload });
    } else {
      renderLoginPrompt(formArea);
    }

    await reload();
    section.hidden = false;
  }

  document.addEventListener("DOMContentLoaded", async () => {
    const container = document.getElementById("post-content");
    const backToListPara = document.getElementById("back-to-list-para");
    const slug = new URLSearchParams(window.location.search).get("slug");

    if (!slug) {
      renderNotFound(container);
      backToListPara.hidden = false;
      return;
    }

    const [post, { data: { user } }, role] = await Promise.all([
      fetchPostBySlug(slug),
      supabase.auth.getUser(),
      fetchMyRole(),
    ]);

    if (!post) {
      renderNotFound(container);
      backToListPara.hidden = false;
      return;
    }

    renderPost(container, post);

    const backToList = document.getElementById("back-to-list");
    if (post.categories?.code) {
      backToList.href = `category.html?code=${encodeURIComponent(post.categories.code)}`;
    }

    // 클라이언트 측 권한 체크는 UX 안내용일 뿐이며, 실제 접근 제어는 DB의 RLS 정책(posts_update_own 등)이 담당한다.
    const canEdit = !!user && (user.id === post.author_id || role === "admin");
    if (canEdit) {
      const editLink = document.createElement("a");
      editLink.className = "btn btn-secondary";
      editLink.id = "edit-post-btn";
      editLink.style.marginLeft = "12px";
      editLink.href = `write.html?edit=${encodeURIComponent(post.id)}`;
      editLink.textContent = "수정";
      backToList.after(editLink);

      if (role === "admin") {
        const unpublishBtn = document.createElement("button");
        unpublishBtn.type = "button";
        unpublishBtn.className = "btn btn-primary";
        unpublishBtn.id = "unpublish-post-btn";
        unpublishBtn.style.marginLeft = "12px";
        unpublishBtn.textContent = "초안으로 내리기";
        unpublishBtn.addEventListener("click", async () => {
          if (!confirm("이 글을 초안으로 내리시겠습니까? 사이트에서 더 이상 표시되지 않습니다.")) return;

          const { error } = await supabase
            .from("posts")
            .update({ status: "draft" })
            .eq("id", post.id);

          if (error) {
            alert(error.message || "초안으로 내리는 중 오류가 발생했습니다");
            return;
          }

          alert("초안으로 내렸습니다");
          window.location.href = backToList.href;
        });
        editLink.after(unpublishBtn);
      }
    }

    backToListPara.hidden = false;

    setupComments(post.id, user, role);
  });
</script>
</body>
</html>
